<!DOCTYPE html>
<html>

<head>

    <title>Access Result</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">


{% if result["status"] == "granted" %}


    <div class="card success">

        <h1>
            🟢 ACCESS GRANTED
        </h1>


        <h2>
            Welcome
        </h2>


        <h3>
            {{ result["user_name"] }}
        </h3>


        <p>
            Device:
            {{ result["device"] }}
        </p>


        <p>
            {{ result["message"] }}
        </p>


    </div>


{% else %}


    <div class="card danger">

        <h1>
            🔴 ACCESS DENIED
        </h1>


        <h3>
            You are not authorized
        </h3>


        <p>
            {{ result["message"] }}
        </p>


    </div>


{% endif %}


<br>


<a href="/" class="btn">
    Back to Home
</a>


</div>


</body>

</html>
