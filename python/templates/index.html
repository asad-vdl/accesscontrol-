<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Smart Access Control</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{

            font-family:'Inter',sans-serif;

            background:#f4f6f9;

        }

        .navbar-brand{

            font-weight:700;

            letter-spacing:.5px;

        }

        .hero-card{

            border:none;

            border-radius:18px;

            overflow:hidden;

            background:linear-gradient(135deg,#0d6efd,#0b5ed7);

            color:#fff;

            box-shadow:0 15px 35px rgba(0,0,0,.12);

        }

        .info-card{

            border:none;

            border-radius:16px;

            transition:.25s;

            box-shadow:0 4px 15px rgba(0,0,0,.06);

        }

        .info-card:hover{

            transform:translateY(-4px);

        }

        .menu-card{

            border:none;

            border-radius:18px;

            text-decoration:none;

            color:#212529;

            display:block;

            background:#fff;

            padding:30px;

            text-align:center;

            transition:.25s;

            box-shadow:0 4px 18px rgba(0,0,0,.08);

            height:100%;

        }

        .menu-card:hover{

            transform:translateY(-5px);

            color:#0d6efd;

            box-shadow:0 12px 28px rgba(13,110,253,.18);

        }

        .menu-icon{

            font-size:42px;

            margin-bottom:15px;

        }

        .menu-title{

            font-size:18px;

            font-weight:600;

        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand" href="#">

            <i class="bi bi-shield-lock-fill"></i>

            Smart Access Control

        </a>

        <span class="badge bg-success fs-6">

            <i class="bi bi-circle-fill"></i>

            System Online

        </span>

    </div>

</nav>



    <div class="row g-4 mt-3">

        <div class="col-md-6">

            <a href="/card" class="menu-card">

                <div class="menu-icon">

                    🪪

                </div>

                <div class="menu-title">

                    Card Authentication

                </div>

            </a>

        </div>

        <div class="col-md-6">

            <a href="/pin" class="menu-card">

                <div class="menu-icon">

                    🔑

                </div>

                <div class="menu-title">

                    PIN Authentication

                </div>

            </a>

        </div>
                <div class="col-md-6">

            <a href="/qr" class="menu-card">

                <div class="menu-icon">

                    📱

                </div>

                <div class="menu-title">

                    QR Authentication

                </div>

            </a>

        </div>

        <div class="col-md-6">

            <a href="/fingerprint" class="menu-card">

                <div class="menu-icon">

                    👆

                </div>

                <div class="menu-title">

                    Fingerprint Authentication

                </div>

            </a>

        </div>

        <div class="col-12">

            <a href="/door" class="menu-card">

                <div class="menu-icon">

                    🚪

                </div>

                <div class="menu-title">

                    Manual Door Control

                </div>

            </a>

        </div>

    </div>

    <div class="card border-0 shadow-sm rounded-4 mt-5">

        <div class="card-header bg-dark text-white py-3 rounded-top-4">

            <h5 class="mb-0">

                <i class="bi bi-cpu"></i>

                Hardware Status

            </h5>

        </div>

        <div class="card-body">

            <div class="row g-4">

                <div class="col-lg-4 col-md-6">

                    <div class="card border-0 bg-light">

                        <div class="card-body text-center">

                            <i class="bi bi-credit-card-2-front text-primary fs-2"></i>

                            <h6 class="mt-3 text-muted">

                                RFID Reader

                            </h6>

                            <span class="badge bg-success px-3 py-2">

                                READY

                            </span>

                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="card border-0 bg-light">

                        <div class="card-body text-center">

                            <i class="bi bi-lock-fill text-danger fs-2"></i>

                            <h6 class="mt-3 text-muted">

                                Maglock

                            </h6>

                            <span class="badge bg-danger px-3 py-2">

                                LOCKED

                            </span>

                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="card border-0 bg-light">

                        <div class="card-body text-center">

                            <i class="bi bi-lightning-charge-fill text-warning fs-2"></i>

                            <h6 class="mt-3 text-muted">

                                Relay

                            </h6>

                            <span class="badge bg-secondary px-3 py-2">

                                OFF

                            </span>

                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="card border-0 bg-light">

                        <div class="card-body text-center">

                            <i class="bi bi-door-open-fill text-primary fs-2"></i>

                            <h6 class="mt-3 text-muted">

                                Door

                            </h6>

                            <span class="badge bg-primary px-3 py-2">

                                CLOSED

                            </span>

                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="card border-0 bg-light">

                        <div class="card-body text-center">

                            <i class="bi bi-volume-up-fill text-warning fs-2"></i>

                            <h6 class="mt-3 text-muted">

                                Buzzer

                            </h6>

                            <span class="badge bg-secondary px-3 py-2">

                                OFF

                            </span>

                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="card border-0 bg-light">

                        <div class="card-body text-center">

                            <i class="bi bi-shield-check text-success fs-2"></i>

                            <h6 class="mt-3 text-muted">

                                System

                            </h6>

                            <span class="badge bg-success px-3 py-2">

                                ONLINE

                            </span>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <footer class="text-center text-muted mt-5 mb-3">

        <small>

            Smart Access Control System © 2026

        </small>

    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
